<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FableUltra Basketball — 3D NBA Game</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='14' fill='%23e8701b'/%3E%3Cpath d='M2 16h28M16 2v28M6 6c6 5 6 15 0 20M26 6c-6 5-6 15 0 20' stroke='%23222' stroke-width='1.6' fill='none'/%3E%3C/svg%3E" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #06080f; }
    #app { position: fixed; inset: 0; }
    #app canvas { display: block; }
    #loading {
      position: fixed; inset: 0; z-index: 200;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: radial-gradient(ellipse at center, #101830 0%, #06080f 70%);
      color: #fff; font-family: 'Arial Black', Arial, sans-serif;
      transition: opacity 0.5s ease; gap: 18px;
    }
    #loading .title { font-size: 42px; letter-spacing: 6px; font-style: italic;
      background: linear-gradient(180deg, #ffd86b, #e08a1e);
      -webkit-background-clip: text; background-clip: text; color: transparent; }
    #loading .bar { width: 260px; height: 4px; background: #1c2a4a; border-radius: 2px; overflow: hidden; }
    #loading .bar::after { content: ''; display: block; height: 100%; width: 40%;
      background: #ffd86b; border-radius: 2px; animation: slide 1.1s ease-in-out infinite; }
    @keyframes slide { 0% { transform: translateX(-100%);} 100% { transform: translateX(650%);} }
    #fatal {
      display: none; position: fixed; inset: auto 12px 12px 12px; z-index: 300;
      background: rgba(120, 10, 10, 0.92); color: #fff; padding: 12px 16px;
      font: 13px/1.5 monospace; border-radius: 8px; white-space: pre-wrap; max-height: 40vh; overflow: auto;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="loading">
    <div class="title">FABLEULTRA BASKETBALL</div>
    <div class="bar"></div>
  </div>
  <div id="fatal"></div>
  <script>
    window.addEventListener('error', (e) => {
      const el = document.getElementById('fatal');
      el.style.display = 'block';
      el.textContent += (e.message || e.error) + '\n' + (e.filename || '') + ':' + (e.lineno || '') + '\n';
    });
    window.addEventListener('unhandledrejection', (e) => {
      const el = document.getElementById('fatal');
      el.style.display = 'block';
      el.textContent += 'Unhandled rejection: ' + (e.reason && e.reason.stack || e.reason) + '\n';
    });
  </script>
  <script type="importmap">
    {
      "imports": {
        "three": "./vendor/three.module.js",
        "three/addons/": "./vendor/addons/"
      }
    }
  </script>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
